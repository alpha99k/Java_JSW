<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    let num1 = 10;
    let num2 = 3.14;
    let num3 = 100;
    console.log(num1,num2,num3)

    const str1 = 'to';
    const str2 = "Javascript";
    const str3 = `welcome ${str1} ${str2} World`; //템플릿 리터럴
    console.log(str1 , str2)
    console.log(str3)

    let b1 = true;
    let b2 = false;
    console.log(b1,b2)

    const namu = { name : '나무', age: 9};
    console.log(namu.name, namu.age);
    
    const arr = [10, 20 , 30];
    console.log(arr[0],arr[1],arr[5]);

    let nullVal=null;   //  object타입
    let unVal;  //  undefined타입 
    console.log(nullVal, unVal)


    console.log(typeof num1, typeof num2, typeof str1, typeof namu, typeof arr, typeof unVal, typeof nullVal)
  </script>
</head>
<body>
  <h1>05-01 변수 선언과 리터럴</h1>
</body>
</html>
