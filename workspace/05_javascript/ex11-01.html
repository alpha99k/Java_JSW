<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    /*
    배열 생성, 읽기, 쓰기
    */

    // 배열 생성 방법 1: Array 생성자 사용


    // 배열 생성 방법 2: JSON 표기법
    const arr = [10, 20, 30];


    // 배열에 요소 추가
    // index 사용
    arr[3] = 40;
    arr[4] = 50;

    // push 메서드 사용: 배열의 마지막 위치에 지정한 요소를 추가

    arr.push(60);
    arr.push(70);
    arr.push(80);
    arr.push(90);



    // index를 이용해서 배열의 마지막 위치에 요소를 추가

    arr[arr.length] = 100;


    // 첫번째 위치에 요소 추가

    arr.unshift(1);


    console.log('첫번째 요소', arr.shift()); //맨앞에서 꺼낸 후 제거
    console.log('마지막 요소', arr.pop()); //맨뒤에서 꺼낸 후 제거

    // 기존 요소의 값을 변경
    let tmp = arr[5]
    arr[5] = arr[6];
    arr[6] = tmp;

    


    // 배열의 모든 요소를 순차적으로 출력

    for(let i =0; i < arr.length; i++){
      console.log(i, arr[i]);
    };


    // 배열의 모든 요소를 역순으로 출력
      for(let i = arr.length -1 ; i >= 0; i--){
      console.log(i, arr[i]);
    };


  </script>
</head>
<body>
  <h1>11-01 배열 생성, 읽기, 쓰기</h1>
</body>
</html>
